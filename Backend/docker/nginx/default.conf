server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # -------------------------------------------------------------------------
    # CORS: handle OPTIONS preflight entirely in nginx (no PHP involved).
    # For real requests, nginx adds CORS headers with `always` so they appear
    # even on PHP 5xx / 502 error pages. Laravel's HandleCors middleware adds
    # the same headers for 2xx responses — browsers tolerate duplicate identical
    # CORS headers, so this is safe.
    # -------------------------------------------------------------------------
    location ~ ^/api/health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location ~ ^/api {
        # Return CORS preflight immediately — never reach PHP.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin  always;
            add_header 'Access-Control-Allow-Credentials' 'true'        always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Accept, Authorization, Content-Type, X-Tenant-Host, X-Requested-With' always;
            add_header 'Access-Control-Max-Age'           86400         always;
            add_header 'Content-Length'                   0;
            add_header 'Content-Type'                     'text/plain; charset=utf-8';
            return 204;
        }

        # Safety-net CORS headers on all non-OPTIONS responses, including PHP
        # error pages (502, 500, etc.) so the browser is never left headerless.
        add_header 'Access-Control-Allow-Origin'      $cors_origin  always;
        add_header 'Access-Control-Allow-Credentials' 'true'        always;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Main location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 300;

        # Buffer settings
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Deny access to sensitive files
    location ~ /(?:composer\.json|composer\.lock|\.env|\.git) {
        deny all;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
