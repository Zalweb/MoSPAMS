server {
    listen 443 ssl;
    server_name api.mospams.shop;

    ssl_certificate /etc/letsencrypt/live/api.mospams.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mospams.shop/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── CORS is handled entirely by Laravel (config/cors.php) ──
    # Do NOT add Access-Control-* headers here to avoid duplicates.

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
    }
}

server {
    listen 80;
    server_name api.mospams.shop;
    return 301 https://$host$request_uri;
}
