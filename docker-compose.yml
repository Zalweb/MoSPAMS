services:
  db:
    image: mysql:8.4
    container_name: mospams-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mospams_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mospams
      MYSQL_PASSWORD: mospams
    ports:
      - "3307:3306"
    volumes:
      - mospams_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-umospams", "-pmospams"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mospams-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: mospams-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8001
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: mospams_db
      DB_USERNAME: mospams
      DB_PASSWORD: mospams
    volumes:
      - ./Backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mospams-network
    command: sh -c "php artisan migrate --force && php -S 0.0.0.0:8001 -t public"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: mospams-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://backend:8001
    depends_on:
      - backend
    networks:
      - mospams-network

volumes:
  mospams_mysql_data:

networks:
  mospams-network:
    driver: bridge
