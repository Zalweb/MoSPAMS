services:
  db:
    image: mysql:8.4
    container_name: mospams-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mospams_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: mospams
      MYSQL_PASSWORD: mospams
    ports:
      - "3307:3306"
    volumes:
      - mospams_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-umospams", "-pmospams"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mospams-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: mospams-backend
    restart: unless-stopped
    ports:
      - "9000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8001
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: mospams_db
      DB_USERNAME: mospams
      DB_PASSWORD: mospams
    volumes:
      - ./Backend:/app
      - backend_vendor:/app/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mospams-network
    command: sh -c "composer install --no-interaction && php artisan migrate:fresh --seed && php artisan serve --host=0.0.0.0 --port=8000"

volumes:
  mospams_mysql_data:
  backend_vendor:

networks:
  mospams-network:
    driver: bridge
