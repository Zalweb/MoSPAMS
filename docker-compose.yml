services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mospams-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_DATABASE: ${DB_DATABASE:-mospams_production}
      MYSQL_USER: ${DB_USERNAME:-mospams_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mospams_password_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Backend/docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - mospams-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password_change_me}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mospams-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - mospams-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: mospams-app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mospams_production}
      DB_USERNAME: ${DB_USERNAME:-mospams_user}
      DB_PASSWORD: ${DB_PASSWORD:-mospams_password_change_me}
      
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_change_me}
      REDIS_PORT: 6379
      
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-.mospams.shop}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}

      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-mospams.shop,*.mospams.shop}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

      MAIL_MAILER: resend
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@mospams.shop}
      MAIL_FROM_NAME: MoSPAMS
      RESEND_API_KEY: ${RESEND_API_KEY}

      FRONTEND_URL: ${FRONTEND_URL:-https://yourdomain.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_ORIGINS_PATTERNS: ${CORS_ALLOWED_ORIGINS_PATTERNS}

      TENANCY_ENFORCEMENT_MODE: ${TENANCY_ENFORCEMENT_MODE:-enforce}
      TENANCY_BASE_DOMAIN: ${TENANCY_BASE_DOMAIN:-mospams.shop}
      TENANCY_PLATFORM_HOSTS: ${TENANCY_PLATFORM_HOSTS:-admin.mospams.shop}
      TENANCY_PUBLIC_HOSTS: ${TENANCY_PUBLIC_HOSTS:-mospams.shop,www.mospams.shop}
      TENANCY_API_HOSTS: ${TENANCY_API_HOSTS:-api.mospams.shop}
      TENANCY_ALLOW_LOCALHOST_FALLBACK: ${TENANCY_ALLOW_LOCALHOST_FALLBACK:-false}
      DEFAULT_SHOP_SUBDOMAIN: ${DEFAULT_SHOP_SUBDOMAIN:-default}
      SHOP_TRIAL_DAYS: ${SHOP_TRIAL_DAYS:-14}
      RUN_MIGRATIONS: "true"

      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    volumes:
      - ./Backend/app:/var/www/html/app
      - ./Backend/routes:/var/www/html/routes
      - ./Backend/config:/var/www/html/config
      - storage_data:/var/www/html/storage
      - ./Backend/docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    ports:
      - "${APP_PORT:-8000}:80"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mospams-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: mospams-ai-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-nvidia_nim}
      - LLM_MODEL=${LLM_MODEL:-meta/llama-3.1-8b-instruct}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-phi3:mini}
      - OLLAMA_BASE_URL=http://mospams-ollama:11434
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - LARAVEL_INTERNAL_URL=http://app:80
      - CHROMA_PATH=/data/chromadb
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-10485760}
      - MAX_DOCS_PER_SHOP=${MAX_DOCS_PER_SHOP:-20}
      - MAX_HISTORY_MESSAGES=${MAX_HISTORY_MESSAGES:-10}
    volumes:
      - ./ai-service:/app
      - chroma_data:/data/chromadb
    depends_on:
      - app
    networks:
      - mospams-network

  ollama:
    image: ollama/ollama:latest
    container_name: mospams-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      - mospams-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local
  chroma_data:
    driver: local
  ollama_data:
    driver: local

networks:
  mospams-network:
    driver: bridge
